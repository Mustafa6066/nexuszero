<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NexusZero Enhancement Test Harness</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #0f172a; color: #e2e8f0; }
    h1 { color: #38bdf8; }
    h2 { color: #a78bfa; border-bottom: 1px solid #334155; padding-bottom: 4px; }
    .test-suite { margin: 16px 0; padding: 12px; background: #1e293b; border-radius: 8px; }
    .pass { color: #4ade80; }
    .fail { color: #f87171; }
    .info { color: #94a3b8; }
    pre { background: #0f172a; padding: 8px; border-radius: 4px; overflow-x: auto; font-size: 13px; }
    #results { max-height: 80vh; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>NexusZero — Enhancement Test Harness</h1>
  <p class="info">Tests are run via Playwright MCP <code>browser_run_code</code> tool.</p>
  <div id="results"></div>
</body>
</html>
