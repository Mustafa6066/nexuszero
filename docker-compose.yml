version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexuszero
      POSTGRES_PASSWORD: nexuszero_dev
      POSTGRES_DB: nexuszero
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/src/rls-policies.sql:/docker-entrypoint-initdb.d/02-rls-policies.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexuszero']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: nexuszero_analytics
      CLICKHOUSE_USER: nexuszero
      CLICKHOUSE_PASSWORD: nexuszero_dev
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ['CMD', 'clickhouse-client', '--query', 'SELECT 1']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: nexuszero
      MINIO_ROOT_PASSWORD: nexuszero_dev
    ports:
      - '9002:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

  playwright:
    image: mcr.microsoft.com/playwright:v1.49.0-noble
    restart: unless-stopped
    command: npx -y playwright run-server --port 3900 --host 0.0.0.0
    ports:
      - '3900:3900'
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3900/json || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  minio_data:
